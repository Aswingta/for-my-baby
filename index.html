<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For My Baby</title>
    <script>
      // Guard against iframe/sandbox environments throwing when code attempts to assign window.fetch
      (function() {
        if (typeof window !== "undefined") {
          try {
            var originalFetch = window.fetch;
            Object.defineProperty(window, "fetch", {
              get: function() { return originalFetch; },
              set: function(val) { console.warn("Silenced write to window.fetch:", val); },
              configurable: true,
              enumerable: true
            });
          } catch (e) {
            console.warn("Could not setup window.fetch setter guard:", e);
          }

          window.addEventListener("error", function(event) {
            var msg = (event && event.message) || "";
            if (msg.indexOf("Cannot set property fetch") > -1 || msg.indexOf("only a getter") > -1) {
              if (event.preventDefault) event.preventDefault();
              if (event.stopPropagation) event.stopPropagation();
            }
          }, true);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
